<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Emmanuel Olannye">
        <meta name="description" content="My First Web Page">
        <meta name="keywords" content="html, css, web, web development, javascript">
        <meta name="description" content="My First Web Page">
        <script src="./assets/script/app.js" defer></script>
        <link rel="stylesheet" href="./assets/style/index.css" media="all">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Metal+Mania&display=swap" rel="stylesheet">
        <title>Fakebook</title>
    </head>
        
    <body>
      <main>
        <header>
          <div class="header-flex">
            <div>
            <h1>FakeBook</h1></div>
            <div class="header-middle">
              <a href="#">Friends</a>
              <a href="#">Pages</a>
              <a href="#">Groups</a>
              <a href="#">My ads</a>
              <a href="#">Settings</a>
            </div>
            <div>
            <img src="./assets/media/hot-air baloon.jpg" alt="user-icon" id="user-icon"></div>
          </div>
        </header>
        <div class="user-info hidden">
            <div class="info-header">
              <input type="button" value="&times;" id="cancel-dropdown">
            </div>
            <div class="info-body">
              <p id="name">Name: </p>
              <p id="username">User Name:</p>
              <p id="email">Email: </p>
            </div>
          </div>
        <div class="container">
          <div class="input-field">
            <div class="input-textarea"><textarea placeholder="What's new?"></textarea></div>
            <div id="preview"></div>
            <div class="input-buttons">
              <div class="media-input-detail">
                <input type="file" id="fileInput" accept="image/*" style="display:none">
                <label for="fileInput">
                <!-- <img src="./assets/media/media_icon.png" alt="Upload" id="media-icon"> -->
                 <i class="fa-regular fa-image" id="media-icon"></i>
                </label>
                <span id="fileName" style="color:white; margin-left:10px;"></span>
              </div>
              <input type="button" value="Post" id="post" disabled>
            </div>
          </div>
        </div>
      </main>
    </body>
</html>
